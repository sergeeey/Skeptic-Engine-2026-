id: feature-02-verify-cli
type: feature
difficulty: medium
description: "Add --verify flag to skeptic-toolkit CLI for pre-analysis integrity check"

prompt: |
  Feature request: Before analyzing a matrix file, automatically verify its integrity
  if user provides --verify-md5 or --verify-zenodo flags.

  Usage:
    skeptic-toolkit matrix.mtx --verify-md5 abc123... --mode fusion
    skeptic-toolkit matrix.mtx --verify-zenodo 10.5281/zenodo.123 --mode syndrome

  If verification fails, exit with error code 1 and clear message.
  If passes, proceed with normal analysis.

target_files:
  - src/skeptic_toolkit/cli.py
  - src/skeptic_toolkit/integrity.py (read-only, do not modify)

acceptance_criteria:
  - --verify-md5 flag added to CLI parser
  - --verify-zenodo flag added to CLI parser
  - Verification runs before analysis
  - Clear error message on failure
  - Exit code 1 on verification failure
  - Exit code 0 on success
  - Tests pass: pytest tests/ -v
  - No changes to existing --mode, --threshold flags

constraints:
  - No breaking changes to existing CLI API
  - Use existing verify_file_integrity() from integrity.py
  - Error message must include: file path, expected hash, actual hash
  - Maximum 50 lines of new code

scoring:
  pass_tests: 35
  no_regression: 25
  api_clarity: 20
  error_messages: 10
  lint_clean: 10

expected_behavior: |
  $ skeptic-toolkit matrix.mtx --verify-md5 wrong_hash --mode fusion
  ❌ VERIFICATION FAILED
  File: matrix.mtx
  Expected MD5: wrong_hash
  Actual MD5:   correct_hash
  [Exit code 1]

  $ skeptic-toolkit matrix.mtx --verify-md5 correct_hash --mode fusion
  ✅ Integrity verified
  [Proceeds with fusion mode analysis]
